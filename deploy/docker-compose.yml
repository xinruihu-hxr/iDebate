services:
  mysql:
    image: mysql:8.0
    container_name: idebate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: idebate
      MYSQL_USER: idebate
      MYSQL_PASSWORD: idebate_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: idebate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: idebate-api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://idebate:idebate_password@mysql:3306/idebate
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: replace_with_a_strong_secret
      JWT_EXPIRES_IN: 7d
      WECHAT_APP_ID: replace_with_wechat_app_id
      WECHAT_APP_SECRET: replace_with_wechat_app_secret
      COS_SECRET_ID: replace_with_tencent_cos_secret_id
      COS_SECRET_KEY: replace_with_tencent_cos_secret_key
      COS_BUCKET: replace_with_cos_bucket
      COS_REGION: ap-guangzhou
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  redis_data:
